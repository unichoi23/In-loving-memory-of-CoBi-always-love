<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In Loving Memory of CoBi</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fdfaf5; /* Natural Linen Color */
            color: #5d4037; /* Classic Brown */
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            text-align: center;
            padding: 100px 20px;
            background: #fdfaf5;
        }
        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: none; /* Keeps your "CoBi" style */
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .main-image {
            width: 100%;
            height: auto;
            border-radius: 2px;
            filter: sepia(10%); /* Subtle warmth */
        }
        .story {
            margin: 60px 0;
            text-align: center;
        }
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }
        .gallery img {
            width: 100%;
            border-radius: 2px;
        }
        footer {
            text-align: center;
            padding: 60px;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>CoBi</h1>
        <p class="subtitle">2013 – 2026</p>
    </header>

    <div class="container">
        <img src="cobi-main.jpg" alt="Cobi" class="main-image">

        <div class="story">
            <h2>The Best View in New York</h2>
            <p>Thirteen years of walks, balcony sunbathing, and checking back to make sure we were right behind her.</p>
        </div>

        <div class="gallery">
            <img src="cobi1.jpg" alt="Cobi Balcony">
            <img src="cobi2.jpg" alt="Cobi Sweater">
        </div>
    </div>

    <footer>
        <p>For a girl who made every street feel like home.</p>
    </footer>

</body>
</html>
